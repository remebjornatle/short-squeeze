name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Refresh data daily at 16:00 UTC (after Finanstilsynet 15:30 CET update)
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch short positions data
        run: |
          mkdir -p public/data
          curl -sSf https://ssr.finanstilsynet.no/api/v2/instruments \
            -o public/data/instruments.json
          echo "Fetched $(jq length public/data/instruments.json) instruments"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
